<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>每日饮食记录</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">食</div>
          <div>
            <h1>每日饮食记录</h1>
            <p id="saveStatus">未保存</p>
          </div>
        </div>

        <div class="top-controls">
          <button id="saveBtn" class="btn primary hidden" type="button">保存</button>
          <button id="copyReportBtn" class="btn" type="button">复制报告</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="panel history-panel">
          <div class="panel-header">
            <h2>数据管理</h2>
            <button id="exportBtn" class="icon-btn" type="button" title="导出数据">导出</button>
          </div>
          <input id="importFile" class="hidden" type="file" accept="application/json" />
          <button id="importBtn" class="btn full" type="button">导入备份</button>

          <div id="todayStats" class="today-stats"></div>
          <section class="stats-section" aria-label="累计统计">
            <h3>累计统计</h3>
            <div id="statsGrid" class="stats-grid"></div>
            <div id="trendBars" class="trend-bars" aria-label="近 14 天热量"></div>
          </section>

          <div class="panel-header small-space">
            <h2>历史记录</h2>
            <button id="jumpTodayBtn" class="icon-btn" type="button" title="回到今天">今天</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </aside>

        <section class="panel editor-panel">
          <div id="dropOverlay" class="drop-overlay">松开即可添加图片</div>
          <div class="panel-header">
            <h2>AI输入</h2>
            <div class="button-row">
              <button id="interpretAiBtn" class="btn primary" type="button">AI解读并保存</button>
              <button id="copyInputBtn" class="btn" type="button">复制输入</button>
              <button id="copyPreviousBtn" class="btn" type="button">复制上一天</button>
              <button id="sampleBtn" class="btn" type="button">载入示例</button>
              <button id="clearBtn" class="btn danger" type="button">清空</button>
            </div>
          </div>

          <textarea id="dietText" spellcheck="false"></textarea>

          <div class="input-tools">
            <label class="btn file-btn" for="aiImageInput" title="选择餐食、菜单或营养成分图片">添加图片</label>
            <input id="aiImageInput" class="hidden" type="file" accept="image/*" multiple />
            <label class="btn file-btn" for="aiCameraInput" title="使用手机后置摄像头拍摄">拍照</label>
            <input id="aiCameraInput" class="hidden" type="file" accept="image/*" capture="environment" />
            <button id="clearImagesBtn" class="btn" type="button">清除图片</button>
            <label class="field compact water-status-field">
              <span>水分状态</span>
              <select id="waterStatus">
                <option value="normal">正常</option>
                <option value="retention">偏水肿/回补</option>
                <option value="depleted">偏脱水/排空</option>
              </select>
            </label>
            <span id="aiInputStatus" class="ai-input-status">可结合文字添加餐食、菜单或营养图片。</span>
          </div>
          <div id="imagePreviewList" class="image-preview-list"></div>

          <div id="unmatchedBox" class="unmatched-box hidden"></div>
          <div id="aiAnswerBox" class="ai-answer-box hidden"></div>
          <div id="aiAuditBox" class="ai-audit-box hidden"></div>

          <details class="profile-box">
            <summary>基础目标</summary>
            <div class="profile-grid">
              <label class="field"><span>年龄</span><input id="profileAge" type="number" min="10" max="100" /></label>
              <label class="field">
                <span>性别</span>
                <select id="profileSex">
                  <option value="male">男</option>
                  <option value="female">女</option>
                </select>
              </label>
              <label class="field"><span>当前体重 kg</span><input id="profileWeight" type="number" min="20" max="250" step="0.1" /></label>
              <label class="field"><span>目标体重 kg</span><input id="profileTargetWeight" type="number" min="20" max="250" step="0.1" /></label>
              <label class="field wide">
                <span>过程类型</span>
                <select id="profileProcessType">
                  <option value="muscle_loss">保持肌肉减重</option>
                  <option value="steady_loss">稳步减重</option>
                  <option value="fast_loss">快速减重</option>
                  <option value="maintain">维持体重</option>
                </select>
              </label>
            </div>
            <div id="targetPreview" class="target-preview"></div>
            <div class="button-row end">
              <button id="saveProfileBtn" class="btn primary" type="button">生成并保存目标</button>
              <button id="resetProfileBtn" class="btn" type="button">恢复默认</button>
            </div>
            <div id="profileSavedNotice" class="profile-saved-notice" aria-live="polite"></div>
          </details>
        </section>

        <aside class="panel quick-panel">
          <div class="panel-header">
            <h2>快捷点选</h2>
          </div>

          <div class="meal-tabs" role="group" aria-label="选择餐次">
            <button class="meal-tab active" data-meal="早餐" type="button">早餐</button>
            <button class="meal-tab" data-meal="午餐" type="button">午餐</button>
            <button class="meal-tab" data-meal="晚餐" type="button">晚餐</button>
            <button class="meal-tab" data-meal="加餐" type="button">加餐</button>
          </div>

          <label class="field search-field">
            <span>搜索</span>
            <input id="foodSearch" type="search" autocomplete="off" />
          </label>

          <div id="categoryTabs" class="category-tabs"></div>
          <div id="quickFoodList" class="quick-food-list"></div>

          <details class="ai-food-box">
            <summary>AI配置</summary>
            <div class="ai-food-tools">
              <div class="ai-config-grid">
                <label class="field"><span>OpenAI API Key</span><input id="openaiApiKey" type="password" autocomplete="off" placeholder="sk-..." /></label>
                <label class="field"><span>模型</span><input id="openaiModel" type="text" value="gpt-5.5" /></label>
                <label class="field wide"><span>接口地址</span><input id="aiBaseUrl" type="url" value="https://live-turing.cn.llm.tcljd.com/api/v1" /></label>
                <label class="field"><span>接口类型</span>
                  <select id="aiApiType">
                    <option value="chat">OpenAI兼容 /chat/completions</option>
                    <option value="responses">OpenAI官方 /responses</option>
                  </select>
                </label>
              </div>
              <label class="check-field">
                <input id="aiUseWebSearch" type="checkbox" checked />
                <span>允许 AI 联网搜索辅助估算</span>
              </label>
              <div class="button-row">
                <button id="useTuringPresetBtn" class="btn" type="button">使用图灵接口</button>
                <button id="saveAiSettingsBtn" class="btn" type="button">保存AI配置</button>
              </div>
              <div id="aiConfigStatus" class="ai-config-status"></div>
              <details class="advanced-ai-tools">
                <summary>高级：待补食物补数据</summary>
                <div id="aiPendingFoods" class="ai-pending"></div>
                <div class="button-row">
                  <button id="runAiLookupBtn" class="btn primary" type="button">补待补食物</button>
                  <button id="copyAiPromptBtn" class="btn" type="button">复制AI查询</button>
                  <button id="applyAiResultBtn" class="btn primary" type="button">应用结果</button>
                </div>
                <textarea id="aiResultInput" class="ai-result-input" spellcheck="false" placeholder="把 AI 返回的 JSON 粘贴到这里"></textarea>
                <p class="ai-hint">主流程请用中间的“发送给AI解读”。这里仅保留手动补数据备用。</p>
              </details>
            </div>
          </details>

          <details class="food-form-box">
            <summary>添加食物</summary>
            <div class="food-form">
              <label class="field"><span>名称</span><input id="newFoodName" type="text" /></label>
              <label class="field"><span>分类</span><input id="newFoodCategory" type="text" value="自定义" /></label>
              <div class="serving-grid">
                <label class="field"><span>份量</span><input id="newFoodQty" type="number" step="0.1" value="100" /></label>
                <label class="field"><span>单位</span>
                  <select id="newFoodUnit">
                    <option value="g">g</option>
                    <option value="ml">ml</option>
                    <option value="个">个</option>
                    <option value="根">根</option>
                    <option value="片">片</option>
                    <option value="份">份</option>
                  </select>
                </label>
              </div>
              <div class="macro-grid">
                <label class="field"><span>热量</span><input id="newFoodKcal" type="number" step="0.1" /></label>
                <label class="field"><span>蛋白</span><input id="newFoodProtein" type="number" step="0.1" /></label>
                <label class="field"><span>碳水</span><input id="newFoodCarbs" type="number" step="0.1" /></label>
                <label class="field"><span>脂肪</span><input id="newFoodFat" type="number" step="0.1" /></label>
                <label class="field"><span>纤维</span><input id="newFoodFiber" type="number" step="0.1" /></label>
              </div>
              <button id="addFoodBtn" class="btn primary full" type="button">加入食物库</button>
            </div>
          </details>
        </aside>

        <section class="report-panel">
          <div id="report" class="report"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
